name: Build Desktop Releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# GitHub Actions: opt into Node 24 for JS-based actions (avoids Node 20 deprecation warnings)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app (Windows bundles)
        run: npm run tauri build

      - name: Rename portable exe
        run: cp src-tauri/target/release/one-thought-tauri.exe src-tauri/target/release/OneThought-portable.exe

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundles
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/OneThought-portable.exe
          if-no-files-found: warn

  build-macos:
    runs-on: macos-latest
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app (macOS bundles)
        run: npm run tauri build

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundles
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/windows-bundles/bundle/nsis/*.exe
            release-artifacts/windows-bundles/bundle/msi/*.msi
            release-artifacts/windows-bundles/OneThought-portable.exe
            release-artifacts/macos-bundles/*.dmg
          generate_release_notes: true
